<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Plot 分析工具</title>

  <!-- Bootstrap 5 (local) -->
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css" />
  <!-- Bootstrap Icons (local) -->
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons.min.css" />
  <!-- Custom styles -->
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ============================= NAVBAR ================================= -->
<nav class="navbar navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold fs-4">
      <i class="bi bi-box-seam me-2"></i>Box Plot 分析工具
    </span>
    <span class="text-white-50 small">尺寸数据可视化平台</span>
  </div>
</nav>

<!-- ============================= MAIN LAYOUT ============================ -->
<div class="container-fluid mt-3 px-4">
  <div class="row g-3">

    <!-- ---- LEFT PANEL -------------------------------------------------- -->
    <div class="col-lg-4 col-xl-3">

      <!-- Upload card -->
      <div class="card shadow-sm mb-3">
        <div class="card-header bg-primary text-white fw-semibold">
          <i class="bi bi-upload me-1"></i>上传 Excel 文件
        </div>
        <div class="card-body">
          <div id="dropZone" class="drop-zone mb-3">
            <i class="bi bi-file-earmark-spreadsheet fs-1 text-muted"></i>
            <div class="mt-2 text-muted">拖拽文件到此处，或点击选择</div>
            <div class="text-muted small">支持 .xlsx / .xls</div>
            <input type="file" id="fileInput" accept=".xlsx,.xls" multiple class="d-none" />
          </div>
          <div id="fileList"></div>
        </div>
      </div>

      <!-- Dimension selection card -->
      <div class="card shadow-sm mb-3" id="dimCard" style="display:none!important">
        <div class="card-header bg-primary text-white fw-semibold d-flex justify-content-between align-items-center">
          <span><i class="bi bi-list-check me-1"></i>选择尺寸</span>
          <div>
            <button class="btn btn-sm btn-light me-1" onclick="selectAllDims()">全选</button>
            <button class="btn btn-sm btn-outline-light" onclick="clearAllDims()">清除</button>
          </div>
        </div>
        <div class="card-body" style="max-height:280px;overflow-y:auto">
          <div id="dimList"></div>
        </div>
      </div>

      <!-- Plot options card -->
      <div class="card shadow-sm mb-3" id="optCard" style="display:none!important">
        <div class="card-header bg-primary text-white fw-semibold">
          <i class="bi bi-sliders me-1"></i>图表设置
        </div>
        <div class="card-body">
          <div class="mb-2">
            <label class="form-label small fw-semibold mb-1">图表标题</label>
            <input type="text" id="plotTitle" class="form-control form-control-sm"
                   value="尺寸测量 Box Plot" />
          </div>
          <div class="mb-2">
            <label class="form-label small fw-semibold mb-1">Y 轴标题</label>
            <input type="text" id="yAxisTitle" class="form-control form-control-sm"
                   value="测量值" />
          </div>
          <div class="form-check mb-1">
            <input class="form-check-input" type="checkbox" id="chkNormalize" />
            <label class="form-check-label small" for="chkNormalize">
              偏差显示（减去理论值）
            </label>
          </div>
          <div class="form-check mb-1">
            <input class="form-check-input" type="checkbox" id="chkShowSpec" checked />
            <label class="form-check-label small" for="chkShowSpec">
              显示规格线（USL / LSL / 理论值）
            </label>
          </div>
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="chkShowPoints" checked />
            <label class="form-check-label small" for="chkShowPoints">
              显示数据点
            </label>
          </div>
        </div>
        <div class="card-footer">
          <button class="btn btn-success w-100" onclick="generatePlot()">
            <i class="bi bi-bar-chart-line me-1"></i>生成 Box Plot
          </button>
        </div>
      </div>

    </div><!-- end left panel -->

    <!-- ---- RIGHT PANEL ------------------------------------------------- -->
    <div class="col-lg-8 col-xl-9">

      <!-- Empty state -->
      <div id="emptyState" class="text-center py-5 text-muted">
        <i class="bi bi-cloud-upload fs-1 d-block mb-3"></i>
        <h5>请先上传 Excel 文件</h5>
        <p class="small">在左侧面板上传文件，配置数据格式，然后生成图表</p>
      </div>

      <!-- Plot area -->
      <div id="plotWrapper" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="mb-0 fw-semibold text-primary">
            <i class="bi bi-graph-up me-1"></i>分析结果
          </h6>
          <div>
            <button class="btn btn-sm btn-outline-secondary me-1" onclick="downloadPNG()">
              <i class="bi bi-image me-1"></i>下载 PNG
            </button>
            <button class="btn btn-sm btn-outline-secondary" onclick="downloadHTML()">
              <i class="bi bi-filetype-html me-1"></i>下载 HTML
            </button>
          </div>
        </div>
        <div id="plotDiv" class="plot-container border rounded shadow-sm"></div>
      </div>

      <!-- Stats table (shown after plot) -->
      <div id="statsWrapper" class="d-none mt-3">
        <div class="card shadow-sm">
          <div class="card-header bg-light fw-semibold small">
            <i class="bi bi-table me-1"></i>数据统计摘要
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-sm table-hover table-bordered mb-0 small" id="statsTable">
                <thead class="table-light">
                  <tr>
                    <th>阶段</th><th>尺寸</th><th>理论值</th>
                    <th>USL</th><th>LSL</th>
                    <th>N</th><th>Min</th><th>Max</th>
                    <th>Mean</th><th>Std</th><th>Cpk</th>
                  </tr>
                </thead>
                <tbody id="statsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div><!-- end right panel -->

  </div>
</div>

<!-- =================== FILE CONFIG MODAL ================================ -->
<div class="modal fade" id="configModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title fw-semibold">
          <i class="bi bi-gear me-2"></i>配置数据格式
          <small class="ms-2 fw-normal" id="configModalFilename"></small>
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">

        <!-- Format selector -->
        <div class="row g-2 mb-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold small">数据格式</label>
            <div class="btn-group w-100" role="group">
              <input type="radio" class="btn-check" name="cfgFormat" id="fmtColPerDim"
                     value="col_per_dim" checked onchange="onFormatChange()" />
              <label class="btn btn-outline-primary" for="fmtColPerDim">
                <i class="bi bi-layout-three-columns me-1"></i>每列一个尺寸
              </label>
              <input type="radio" class="btn-check" name="cfgFormat" id="fmtRowPerDim"
                     value="row_per_dim" onchange="onFormatChange()" />
              <label class="btn btn-outline-primary" for="fmtRowPerDim">
                <i class="bi bi-layout-split me-1"></i>每行一个尺寸
              </label>
            </div>
          </div>
        </div>

        <!-- col_per_dim options -->
        <div id="cfgColPerDim">
          <div class="row g-2 mb-2">
            <div class="col-md-3">
              <label class="form-label small fw-semibold">尺寸名行号 <span class="text-muted">(1开始)</span></label>
              <input type="number" id="cfgHeaderRow" class="form-control form-control-sm" value="1" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">跳过前N列</label>
              <input type="number" id="cfgSkipCols" class="form-control form-control-sm" value="0" min="0" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">理论值行号 <span class="text-muted">(空=无)</span></label>
              <input type="number" id="cfgNominalRow" class="form-control form-control-sm" placeholder="空" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">数据起始行号</label>
              <input type="number" id="cfgDataStartRow" class="form-control form-control-sm" value="2" min="1" />
            </div>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-md-3">
              <label class="form-label small fw-semibold">USL 行号 <span class="text-muted">(空=无)</span></label>
              <input type="number" id="cfgUslRow" class="form-control form-control-sm" placeholder="空" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">LSL 行号 <span class="text-muted">(空=无)</span></label>
              <input type="number" id="cfgLslRow" class="form-control form-control-sm" placeholder="空" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">上公差行号 <span class="text-muted">(空=无)</span></label>
              <input type="number" id="cfgUpperTolRow" class="form-control form-control-sm" placeholder="空" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">下公差行号 <span class="text-muted">(空=无)</span></label>
              <input type="number" id="cfgLowerTolRow" class="form-control form-control-sm" placeholder="空" min="1" />
            </div>
          </div>
        </div>

        <!-- row_per_dim options -->
        <div id="cfgRowPerDim" class="d-none">
          <div class="row g-2 mb-2">
            <div class="col-md-3">
              <label class="form-label small fw-semibold">尺寸名列号 <span class="text-muted">(1开始)</span></label>
              <input type="number" id="cfgNameCol" class="form-control form-control-sm" value="1" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">首行数据行号</label>
              <input type="number" id="cfgFirstDataRow" class="form-control form-control-sm" value="2" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">理论值列号 <span class="text-muted">(空=无)</span></label>
              <input type="number" id="cfgNominalCol" class="form-control form-control-sm" placeholder="空" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">测量数据起始列号</label>
              <input type="number" id="cfgDataStartCol" class="form-control form-control-sm" value="5" min="1" />
            </div>
          </div>
          <div class="row g-2 mb-3">
            <div class="col-md-3">
              <label class="form-label small fw-semibold">USL 列号 <span class="text-muted">(空=无)</span></label>
              <input type="number" id="cfgUslCol" class="form-control form-control-sm" placeholder="空" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">LSL 列号 <span class="text-muted">(空=无)</span></label>
              <input type="number" id="cfgLslCol" class="form-control form-control-sm" placeholder="空" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">上公差列号 <span class="text-muted">(空=无)</span></label>
              <input type="number" id="cfgUpperTolCol" class="form-control form-control-sm" placeholder="空" min="1" />
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold">下公差列号 <span class="text-muted">(空=无)</span></label>
              <input type="number" id="cfgLowerTolCol" class="form-control form-control-sm" placeholder="空" min="1" />
            </div>
          </div>
        </div>

        <!-- Preview table -->
        <h6 class="fw-semibold small mb-1">
          <i class="bi bi-eye me-1"></i>数据预览（前 20 行）
        </h6>
        <div class="table-responsive preview-table-wrap">
          <table class="table table-sm table-bordered table-hover small mb-0" id="previewTable">
            <tbody id="previewBody"></tbody>
          </table>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" onclick="applyConfig()">
          <i class="bi bi-check2 me-1"></i>提取尺寸
        </button>
      </div>
    </div>
  </div>
</div>

<!-- =================== DIM EDITOR MODAL ================================= -->
<div class="modal fade" id="dimEditorModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title fw-semibold">
          <i class="bi bi-pencil-square me-2"></i>编辑尺寸显示信息
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small">可在此修改尺寸的显示名称及规格值（不影响原始数据，仅影响图表显示）。</p>
        <div class="table-responsive">
          <table class="table table-sm table-bordered small">
            <thead class="table-light">
              <tr>
                <th>原始名称</th>
                <th>显示名称</th>
                <th>理论值（覆盖）</th>
                <th>USL（覆盖）</th>
                <th>LSL（覆盖）</th>
              </tr>
            </thead>
            <tbody id="dimEditorBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" onclick="applyDimEdits()" data-bs-dismiss="modal">
          <i class="bi bi-check2 me-1"></i>应用
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap 5 JS (local) -->
<script src="/static/vendor/popper.min.js"></script>
<script src="/static/vendor/bootstrap.min.js"></script>

<!-- Plotly.js (local) -->
<script src="/static/vendor/plotly.min.js"></script>

<!-- App JS -->
<script src="/static/js/app.js"></script>
</body>
</html>
